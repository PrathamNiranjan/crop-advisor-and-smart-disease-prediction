services:
  - type: web
    name: crop-advisor-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_DEBUG
        value: false
      - key: ALLOWED_ORIGINS
        value: https://your-app.netlify.app
      - key: DISEASE_MODEL_WEIGHTS
        value: weights/disease_model.pth
      - key: PRICE_MODEL_WEIGHTS
        value: weights/price_model_tomato.pth
    healthCheckPath: /api/health
    plan: starter
