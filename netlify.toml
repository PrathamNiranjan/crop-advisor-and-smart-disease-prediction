[build]
  base    = "frontend/"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA redirect — all routes → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Proxy /api calls to Flask backend (set VITE_API_URL in Netlify env vars instead)
# [[redirects]]
#   from   = "/api/*"
#   to     = "https://your-backend.onrender.com/api/:splat"
#   status = 200
#   force  = true
